services:
  # === Ubuntu ===
  ubuntu-26.04:
    build:
      context: .
      dockerfile: Dockerfile.multiarch
      args:
        DISTRO: ubuntu:26.04
        PKG_FORMAT: deb
    environment:
      - TAG_SUFFIX=${TAG_SUFFIX:-}
    volumes:
      - ..:/build:z
      - cargo-registry:/root/.cargo/registry
      - ./output:/output:z
    command: bash /build/manual-build/build.sh

  ubuntu-24.04:
    build:
